# 改编自 macuhy/macos-app-release-kit 的 templates/release.yml
# 适配点：SPM 项目（无 .xcodeproj）；无 Apple 开发者证书 → ad-hoc 签名、跳过公证；
#        源码与分发同一个公共仓库 → 用 GITHUB_TOKEN 即可，无需 RELEASE_REPO_PAT。
# 唯一需要的 Secret：SPARKLE_PRIVATE_KEY（Sparkle EdDSA 私钥）
name: Build & Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version: { description: '版本号（如 1.2.0）', required: true }

permissions:
  contents: write

env:
  APP_NAME: 日历
  ZIP_NAME: Calendar.zip
  DOWNLOAD_URL_PREFIX: https://github.com/uhyrdtrdtfg-creator/menubar-calendar/releases/download/

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # 把临时 keychain 设为搜索域首位（保留默认登录链）
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')
          if [ -z "$IDENTITY" ]; then echo "未找到 Developer ID Application 证书" >&2; exit 1; fi
          echo "::add-mask::$IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "已导入签名身份: $IDENTITY"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build & package app
        run: |
          VERSION="${{ steps.version.outputs.version }}" \
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}" \
          SIGN_IDENTITY="$SIGN_IDENTITY" \
          ./build_app.sh

      - name: Notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # 公证需要先打一个 zip 提交；--wait 阻塞到出结果
          ditto -c -k --sequesterRsrc --keepParent "build/$APP_NAME.app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait
          # 把公证票据装订进 .app，之后离线也能通过 Gatekeeper
          xcrun stapler staple "build/$APP_NAME.app"
          xcrun stapler validate "build/$APP_NAME.app"
          rm -f "$RUNNER_TEMP/notarize.zip"

      - name: Create release ZIP
        run: |
          # 从已装订的 .app 重新打包，作为分发 + Sparkle 签名对象
          cd build && ditto -c -k --sequesterRsrc --keepParent "$APP_NAME.app" "$ZIP_NAME" && cd ..
          echo "ZIP_PATH=build/$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Install Sparkle tools
        run: |
          curl -L -o /tmp/Sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz"
          mkdir -p /tmp/sparkle && tar -xf /tmp/Sparkle.tar.xz -C /tmp/sparkle
          echo "SPARKLE_BIN=/tmp/sparkle/bin" >> "$GITHUB_ENV"

      - name: Sign with Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY="$RUNNER_TEMP/sparkle_key"; printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY"
          OUT=$("$SPARKLE_BIN/sign_update" "$ZIP_PATH" -f "$KEY")
          rm -f "$KEY"
          echo "ed_signature=$(echo "$OUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')" >> "$GITHUB_ENV"
          echo "length=$(echo "$OUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')" >> "$GITHUB_ENV"

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" && git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" "$ZIP_PATH" --repo "${{ github.repository }}" \
            --title "$APP_NAME $VERSION" --generate-notes

      - name: Update appcast.xml on main
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          set -euo pipefail
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git fetch origin main && git checkout main
          python3 scripts/update_appcast.py appcast.xml \
            "$APP_NAME" "$VERSION" "$BUILD_NUMBER" "$ed_signature" "$length" \
            "${DOWNLOAD_URL_PREFIX}${TAG}/${ZIP_NAME}" \
            "https://github.com/${{ github.repository }}/releases/tag/$TAG"
          git add appcast.xml
          git diff --cached --quiet || git commit -m "release: $APP_NAME $VERSION (build $BUILD_NUMBER)"
          git push origin main
